<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>CRUD Sinh viên</title>
    <style>
      body {
        font-family: Arial;
      }
      table {
        border-collapse: collapse;
        width: 80%;
        margin: 20px auto;
      }
      th,
      td {
        border: 1px solid black;
        padding: 10px;
        text-align: center;
      }
      th {
        background: #ddd;
      }
      .cntt {
        color: green;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <h2 style="text-align: center">Quản lý Sinh viên</h2>

    <div style="text-align: center">
      <input id="name" placeholder="Tên" />
      <input id="age" type="number" placeholder="Tuổi" />
      <input id="class" placeholder="Lớp" />
      <button id="btnSave">Thêm</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>STT</th>
          <th>Tên</th>
          <th>Tuổi</th>
          <th>Lớp</th>
          <th>Hành động</th>
        </tr>
      </thead>
      <tbody id="studentTable"></tbody>
    </table>

    <script src="./script.js"></script>
  </body>
</html>
