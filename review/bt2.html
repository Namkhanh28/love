<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hiển thị/Ẩn mật khẩu</title>
    <style>
        .password-container {
            position: relative;
            display: flex;
            align-items: center;
            width: 300px;
        }
        .password-input {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
            padding-right: 40px;
        }
        .toggle-password {
            position: absolute;
            right: 10px;
            cursor: pointer;
            background: none;
            border: none;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <div class="password-container">
        <input type="password" id="password" class="password-input" placeholder="Enter your password">
        <button class="toggle-password" onclick="togglePassword()">👁️</button>
    </div>

    <script>
        function togglePassword() {
            let passwordInput = document.getElementById("password");
            if (passwordInput.type === "password") {
                passwordInput.type = "text";
            } else {
                passwordInput.type = "password";
            }
        }
    </script>

</body>
</html>
